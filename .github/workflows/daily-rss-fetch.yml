name: Manual RSS candidate check

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Fetch RSS into local candidate file
        run: >
          python3 scripts/fetch_rss.py
          --since-days 3
          --max-per-source 10
          --candidate-output .cache/rss-candidates.jsonl
          --dismissed .cache/rss-dismissed.jsonl
          --report .cache/rss-fetch-report.md

      - name: Validate JSONL database
        run: python3 scripts/validate_database.py

      - name: Export SQLite artifact
        run: python3 scripts/export_sqlite.py --output .cache/knowledge.sqlite

      - name: Upload RSS candidate artifact
        uses: actions/upload-artifact@v4
        with:
          name: rss-candidates
          path: |
            .cache/rss-candidates.jsonl
            .cache/rss-fetch-report.md

      - name: Upload SQLite artifact
        uses: actions/upload-artifact@v4
        with:
          name: knowledge-sqlite
          path: .cache/knowledge.sqlite
